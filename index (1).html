<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotereya O'yini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #15172b; }
        .card { width: 90%; max-width: 600px; background: #232543; border-radius: 20px; padding: 35px; box-shadow: 0 15px 40px rgba(0,0,0,.4); }
        h1 { text-align: center; color: #7da8ff; margin-bottom: 10px; }
        .sub { text-align: center; color: #c7c7c7; margin-bottom: 25px; }
        #playerName { width: 100%; height: 55px; border: none; border-radius: 12px; text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .btn { border: none; cursor: pointer; padding: 14px 28px; border-radius: 12px; background: #79a6ff; color: #111; font-size: 18px; font-weight: bold; }
        .btn:hover { opacity: .9; }
        .btn-red { background: #ff6b6b; color: #fff; }
        .inputs-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .num-input { width: 65px; height: 50px; text-align: center; font-size: 20px; border-radius: 10px; border: none; }
        .btn-row { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .ball { width: 50px; height: 50px; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 4px; font-weight: bold; }
        .ball-user { background: #8eb7ff; color: #000; }
        .ball-lucky { background: #90d17b; color: #000; }
        .ball-match { background: gold; color: #000; }
        .section { margin-bottom: 20px; }
        .label { color: white; margin-bottom: 10px; }
        .match-count { color: white; font-size: 28px; text-align: center; margin-bottom: 10px; }
        .result-badge { display: inline-block; padding: 12px 20px; border-radius: 10px; font-weight: bold; }
        .center { text-align: center; }
        .err { color: #ff8080; text-align: center; margin-top: 10px; }
        #welcome { color: white; text-align: center; margin-bottom: 15px; }
        #game-screen, #result-section { display: none; }
        /* REYTING */
        #leaderboard { margin-top: 20px; }
        .lb-title { color: #7da8ff; font-size: 20px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; background: #1a1c3a; }
        .lb-row:nth-child(1) { background: #3a3000; }
        .lb-row:nth-child(2) { background: #2a2a2a; }
        .lb-row:nth-child(3) { background: #2a1a00; }
        .lb-rank { color: #7da8ff; font-weight: bold; width: 30px; }
        .lb-name { color: white; flex: 1; margin-left: 10px; }
        .lb-wins { color: gold; font-weight: bold; }
        .lb-matches { color: #90d17b; font-size: 13px; }
        .tab-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; border-radius: 10px; background: #1a1c3a; color: #ccc; cursor: pointer; border: none; font-size: 15px; }
        .tab.active { background: #79a6ff; color: #111; font-weight: bold; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="login-screen">
    <h1>Lotereya O'yini</h1>
    <p class="sub">Avval ism kiriting, keyin o'ynang</p>
    <input type="text" id="playerName" placeholder="Ismingizni kiriting">
    <div class="btn-row">
        <button class="btn" onclick="startGame()">Boshlash</button>
        <button class="btn" onclick="showTab('lb')">🏆 Reyting</button>
    </div>
</div>

<!-- O'YIN -->
<div class="card" id="game-screen">
    <div class="tab-row">
        <button class="tab active" onclick="showTab('game')">🎮 O'yin</button>
        <button class="tab" onclick="showTab('lb')">🏆 Reyting</button>
    </div>
    <div id="welcome"></div>
    <h1>Lotereya O'yini</h1>
    <p class="sub">1–49 oralig'idan 6 ta son tanlang</p>
    <div id="input-section">
        <div class="inputs-row" id="inputs-row"></div>
        <div class="btn-row">
            <button class="btn" onclick="randomFill()">Tasodifiy</button>
            <button class="btn" onclick="play()">O'ynash</button>
        </div>
        <div class="err" id="err"></div>
    </div>
    <div id="result-section">
        <div class="section">
            <div class="label">Sizning sonlaringiz:</div>
            <div id="user-balls"></div>
        </div>
        <div class="section">
            <div class="label">Omadli sonlar:</div>
            <div id="lucky-balls"></div>
        </div>
        <div class="section center">
            <div class="match-count" id="match-count"></div>
            <div id="result-msg"></div>
        </div>
        <div class="btn-row">
            <button class="btn" onclick="restart()">Qayta o'ynash</button>
        </div>
    </div>

    <!-- REYTING PANEL -->
    <div id="lb-section" style="display:none;">
        <div class="lb-title">🏆 Umumiy Reyting</div>
        <div id="lb-list">Yuklanmoqda...</div>
        <div class="btn-row" style="margin-top:15px;">
            <button class="btn btn-red" onclick="showTab('game')">O'yinga qaytish</button>
        </div>
    </div>
</div>

<script>
const DB = "https://lotereya-c1177-default-rtdb.europe-west1.firebasedatabase.app";
let playerName = "", inputs = [];
const N = 6, MAX = 49;

function startGame() {
    const name = document.getElementById("playerName").value.trim();
    if (name.length < 1) { alert("Ism kiriting!"); return; }
    playerName = name;
    document.getElementById("welcome").innerHTML = "<h2>Xush kelibsiz, " + playerName + "!</h2>";
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    showTab('game');
    init();
}

function init() {
    const row = document.getElementById("inputs-row");
    row.innerHTML = ""; inputs = [];
    for (let i = 0; i < N; i++) {
        const inp = document.createElement("input");
        inp.type = "number"; inp.min = 1; inp.max = MAX; inp.className = "num-input";
        row.appendChild(inp); inputs.push(inp);
    }
}

function randomFill() {
    const nums = [];
    while (nums.length < N) { let r = Math.floor(Math.random() * MAX) + 1; if (!nums.includes(r)) nums.push(r); }
    inputs.forEach((x, i) => x.value = nums[i]);
}

function play() {
    let vals = [];
    const err = document.getElementById("err");
    err.textContent = "";
    for (let inp of inputs) {
        const v = parseInt(inp.value);
        if (isNaN(v) || v < 1 || v > 49) { err.textContent = "1-49 oraligida son kiriting!"; return; }
        if (vals.includes(v)) { err.textContent = "Sonlar takrorlanmasin!"; return; }
        vals.push(v);
    }
    const lucky = [];
    while (lucky.length < N) { let r = Math.floor(Math.random() * MAX) + 1; if (!lucky.includes(r)) lucky.push(r); }
    const matches = vals.filter(x => lucky.includes(x));

    // Ballarni hisoblash
    const score = matches.length;

    // Firebase ga saqlash
    saveScore(playerName, score);

    let userBalls = document.getElementById("user-balls");
    userBalls.innerHTML = "";
    vals.forEach(v => {
        let b = document.createElement("span");
        b.className = "ball " + (matches.includes(v) ? "ball-match" : "ball-user");
        b.textContent = v; userBalls.appendChild(b);
    });

    let luckyBalls = document.getElementById("lucky-balls");
    luckyBalls.innerHTML = "";
    lucky.forEach(v => {
        let b = document.createElement("span");
        b.className = "ball " + (matches.includes(v) ? "ball-match" : "ball-lucky");
        b.textContent = v; luckyBalls.appendChild(b);
    });

    document.getElementById("match-count").textContent = matches.length + "/6 mos keldi";

    let txt = "";
    if (matches.length === 6) txt = "🎉 JACKPOT! G'olibsiz!";
    else if (matches.length >= 4) txt = "🔥 Zo'r natija!";
    else if (matches.length >= 2) txt = "👍 Yaxshi!";
    else txt = "😔 Omad kelmadi";

    document.getElementById("result-msg").innerHTML = '<span class="result-badge">' + txt + '</span>';
    document.getElementById("input-section").style.display = "none";
    document.getElementById("result-section").style.display = "block";
}

function restart() {
    document.getElementById("result-section").style.display = "none";
    document.getElementById("input-section").style.display = "block";
    init();
}

// Firebase saqlash
async function saveScore(name, score) {
    try {
        // Avval mavjud ma'lumotni olish
        const res = await fetch(DB + "/reyting/" + encodeURIComponent(name) + ".json");
        const data = await res.json();
        
        let totalGames = 1, bestScore = score, totalScore = score;
        if (data) {
            totalGames = (data.totalGames || 0) + 1;
            totalScore = (data.totalScore || 0) + score;
            bestScore = Math.max(data.bestScore || 0, score);
        }

        await fetch(DB + "/reyting/" + encodeURIComponent(name) + ".json", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, totalGames, bestScore, totalScore })
        });
    } catch(e) { console.log("Saqlash xatosi:", e); }
}

// Reytingni ko'rsatish
async function loadLeaderboard() {
    const lb = document.getElementById("lb-list");
    lb.innerHTML = "Yuklanmoqda...";
    try {
        const res = await fetch(DB + "/reyting.json");
        const data = await res.json();
        if (!data) { lb.innerHTML = '<p style="color:#ccc;text-align:center;">Hali o\'yinchilar yo\'q</p>'; return; }
        
        const players = Object.values(data).sort((a, b) => b.bestScore - a.bestScore || b.totalScore - a.totalScore);
        
        const medals = ["🥇", "🥈", "🥉"];
        lb.innerHTML = players.slice(0, 20).map((p, i) => 
            '<div class="lb-row">' +
            '<span class="lb-rank">' + (medals[i] || (i+1)+".") + '</span>' +
            '<span class="lb-name">' + p.name + '</span>' +
            '<span class="lb-matches">Eng yaxshi: ' + p.bestScore + '/6</span>&nbsp;' +
            '<span class="lb-wins">O\'yin: ' + p.totalGames + '</span>' +
            '</div>'
        ).join('');
    } catch(e) { lb.innerHTML = '<p style="color:#ff8080;text-align:center;">Xatolik yuz berdi</p>'; }
}

function showTab(tab) {
    const gameContent = document.getElementById("input-section");
    const resultContent = document.getElementById("result-section");
    const lbSection = document.getElementById("lb-section");
    const tabs = document.querySelectorAll(".tab");

    if (tab === 'lb') {
        if (gameContent) gameContent.style.display = "none";
        if (resultContent) resultContent.style.display = "none";
        lbSection.style.display = "block";
        if (document.getElementById("welcome")) document.getElementById("welcome").style.display = "none";
        document.querySelector("h1") && (document.querySelector("h1").style.display = "none");
        document.querySelector(".sub") && (document.querySelector(".sub").style.display = "none");
        tabs.forEach(t => t.classList.remove("active"));
        if (tabs[1]) tabs[1].classList.add("active");
        loadLeaderboard();
    } else {
        lbSection.style.display = "none";
        gameContent.style.display = "block";
        if (document.getElementById("welcome")) document.getElementById("welcome").style.display = "block";
        document.querySelector("h1") && (document.querySelector("h1").style.display = "block");
        document.querySelector(".sub") && (document.querySelector(".sub").style.display = "block");
        tabs.forEach(t => t.classList.remove("active"));
        if (tabs[0]) tabs[0].classList.add("active");
    }
}
</script>
</body>
</html>
